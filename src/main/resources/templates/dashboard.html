<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EDM Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; }
        .header {
            background: #1a73e8;
            color: white;
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { font-size: 22px; }
        .header p { font-size: 13px; opacity: 0.8; }
        .stats {
            display: flex;
            gap: 16px;
            padding: 24px 32px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px 28px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            min-width: 160px;
        }
        .stat-card .number { font-size: 36px; font-weight: 700; color: #1a73e8; }
        .stat-card .label { font-size: 13px; color: #666; margin-top: 4px; }
        .content { padding: 0 32px 32px; }
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #1a1a1a; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        th { background: #f8f9fa; padding: 12px 16px; text-align: left; font-size: 13px; color: #666; font-weight: 600; border-bottom: 1px solid #eee; }
        td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #f0f0f0; color: #333; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8f9ff; }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-green { background: #e6f4ea; color: #137333; }
        .btn-view {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn-view:hover { background: #1557b0; }
        .empty { text-align: center; padding: 48px; color: #999; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>🔐 EDM Dashboard</h1>
        <p>Android Enterprise Device Management</p>
    </div>
    <div style="text-align:right;">
        <div style="font-size:28px; font-weight:700;" th:text="${totalDevices}">0</div>
        <div style="font-size:13px; opacity:0.8;">Enrolled Devices</div>
    </div>
</div>

<div class="stats">
    <div class="stat-card">
        <div class="number" th:text="${totalDevices}">0</div>
        <div class="label">Total Devices</div>
    </div>
    <div class="stat-card">
        <div class="number" style="color:#34a853;">
            <span th:text="${totalDevices}">0</span>
        </div>
        <div class="label">Active Enrollments</div>
    </div>
</div>

<div class="content">
    <div class="section-title">Enrolled Devices</div>

    <div th:if="${devices.empty}" class="empty">
        No devices enrolled yet. Use the Android app to enroll a device.
    </div>

    <table th:if="${!devices.empty}">
        <thead>
        <tr>
            <th>Device UUID</th>
            <th>Enrollment Token</th>
            <th>Status</th>
            <th>Enrolled At</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="device : ${devices}">
            <td th:text="${device.deviceUuid}"></td>
            <td th:text="${device.enrollmentToken}"></td>
            <td>
                <span class="badge badge-green" th:text="${device.status}">ENROLLED</span>
            </td>
            <td th:text="${#temporals.format(device.enrolledAt, 'dd MMM yyyy HH:mm')}"></td>
            <td>
                <a class="btn-view" th:href="@{/dashboard/device/{id}(id=${device.id})}">View Details</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
