<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Device Detail</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; }
        .header {
            background: #1a73e8;
            color: white;
            padding: 20px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .header h1 { font-size: 20px; }
        .content { padding: 24px 32px; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }
        .card-title { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 16px; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
        .info-item .key { font-size: 12px; color: #999; margin-bottom: 4px; }
        .info-item .value { font-size: 14px; color: #333; font-weight: 500; }
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #1a1a1a; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        th { background: #f8f9fa; padding: 12px 16px; text-align: left; font-size: 13px; color: #666; font-weight: 600; border-bottom: 1px solid #eee; }
        td { padding: 10px 16px; font-size: 13px; border-bottom: 1px solid #f0f0f0; color: #333; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8f9ff; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-blue { background: #e8f0fe; color: #1a73e8; }
        .badge-gray { background: #f1f3f4; color: #666; }
        .search-box {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            outline: none;
        }
        .search-box:focus { border-color: #1a73e8; }
        .no-info { color: #999; font-style: italic; }
    </style>
</head>
<body>

<div class="header">
    <a class="back-btn" href="/dashboard">← Back</a>
    <div>
        <h1>Device Details</h1>
        <p style="font-size:13px; opacity:0.8;" th:text="${device.deviceUuid}"></p>
    </div>
</div>

<div class="content">

    <!-- Device Info Card -->
    <div class="card">
        <div class="card-title">📱 Device Information</div>
        <div th:if="${deviceInfo != null}" class="info-grid">
            <div class="info-item">
                <div class="key">Model</div>
                <div class="value" th:text="${deviceInfo.model}">-</div>
            </div>
            <div class="info-item">
                <div class="key">Manufacturer</div>
                <div class="value" th:text="${deviceInfo.manufacturer}">-</div>
            </div>
            <div class="info-item">
                <div class="key">OS Version</div>
                <div class="value" th:text="${deviceInfo.osVersion}">-</div>
            </div>
            <div class="info-item">
                <div class="key">SDK Version</div>
                <div class="value" th:text="${deviceInfo.sdkVersion}">-</div>
            </div>
            <div class="info-item">
                <div class="key">Serial Number</div>
                <div class="value" th:text="${deviceInfo.serialNumber}">-</div>
            </div>
            <div class="info-item">
                <div class="key">IMEI</div>
                <div class="value" th:text="${deviceInfo.imei != null ? deviceInfo.imei : 'N/A'}">-</div>
            </div>
            <div class="info-item">
                <div class="key">Collected At</div>
                <div class="value" th:text="${#temporals.format(deviceInfo.collectedAt, 'dd MMM yyyy HH:mm')}">-</div>
            </div>
        </div>
        <div th:if="${deviceInfo == null}" class="no-info">No device info collected yet.</div>
    </div>

    <!-- App Inventory -->
    <div class="section-title">
        📦 Installed Apps
        <span style="font-size:14px; color:#666; font-weight:400;" th:text="'(' + ${totalApps} + ' apps)'"></span>
    </div>

    <input class="search-box" type="text" id="searchBox"
           placeholder="Search apps by name or package..." onkeyup="filterApps()"/>

    <table id="appsTable">
        <thead>
        <tr>
            <th>App Name</th>
            <th>Package Name</th>
            <th>Version</th>
            <th>Install Source</th>
            <th>Type</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="app : ${apps}">
            <td th:text="${app.appName}"></td>
            <td style="font-family:monospace; font-size:12px;" th:text="${app.packageName}"></td>
            <td th:text="${app.versionName}"></td>
            <td th:text="${app.installSource}"></td>
            <td>
                <span th:if="${app.systemApp}" class="badge badge-gray">System</span>
                <span th:if="${!app.systemApp}" class="badge badge-blue">User</span>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    function filterApps() {
        const input = document.getElementById('searchBox').value.toLowerCase();
        const rows = document.querySelectorAll('#appsTable tbody tr');
        rows.forEach(row => {
            const text = row.textContent.toLowerCase();
            row.style.display = text.includes(input) ? '' : 'none';
        });
    }
</script>

</body>
</html>
